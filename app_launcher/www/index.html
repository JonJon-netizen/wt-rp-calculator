<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Style Launcher - Glass Edition</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        :root {
            --sidebar-bg: rgba(26, 31, 38, 0.7);
            --main-bg: #0b0e11;
            --text-main: #dcdedf;
            --text-dim: #8f98a0;
            --accent: #1a9fff;
            --card-glass: rgba(30, 35, 43, 0.5);
            --border-glass: rgba(255, 255, 255, 0.1);
            --radius-large: 18px;
            --radius-mid: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Motiva Sans", "Segoe UI", Tahoma, sans-serif;
        }

        body {
            background-color: var(--main-bg);
            /* Animated background gradient for extra flair */
            background: radial-gradient(circle at top left, #1a2333 0%, #0b0e11 60%),
                       radial-gradient(circle at bottom right, #0d1217 0%, #0b0e11 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar - Glassmorphic */
        .sidebar {
            width: 270px;
            background-color: var(--sidebar-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-glass);
            overflow-y: auto;
            margin: 10px;
            border-radius: var(--radius-large);
            height: calc(100vh - 20px);
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px 20px;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }

        .sidebar-section {
            padding: 10px 20px;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: flex;
            justify-content: space-between;
        }

        .sidebar-list {
            list-style: none;
        }

        .sidebar-item {
            padding: 10px 20px;
            margin: 0 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-item:hover {
            color: white;
            background-color: rgba(255,255,255,0.08);
            transform: translateX(5px);
        }

        .sidebar-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        /* Main Content area */
        .main-container {
            flex-grow: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-large);
            border: 1px solid var(--border-glass);
        }

        .content-header {
            margin-bottom: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-app-btn {
            background: linear-gradient(135deg, #1a9fff 0%, #0077c4 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(26, 159, 255, 0.2);
        }

        .add-app-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(26, 159, 255, 0.4);
        }

        h2 {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            color: white;
            opacity: 0.9;
            font-weight: 700;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        /* Glassmorphic Cards */
        .game-card {
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-mid);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            aspect-ratio: 16/10; /* Slightly different aspect ratio for modern feel */
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 15px rgba(26, 159, 255, 0.3);
        }

        .game-image-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 100%);
            position: relative;
            background-size: cover;
            background-position: center;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .game-card:hover .game-image-container {
            transform: scale(1.1);
        }

        .game-image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1;
        }

        .game-icon-large {
            width: 60px;
            height: 60px;
            object-fit: contain;
            z-index: 2;
            transition: transform 0.4s ease;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .game-card:hover .game-icon-large {
            transform: scale(1.1);
        }

        .game-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 100%);
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-new {
            background: linear-gradient(90deg, #a3cf06 0%, #d4e029 100%);
            color: black;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 900;
            box-shadow: 0 0 10px rgba(163, 207, 6, 0.4);
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(239, 68, 68, 0.3);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 5;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
        }

        .game-card:hover .delete-btn {
            display: flex;
        }

        /* Webkit scrollbar glass */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .empty-state {
            color: var(--text-dim);
            font-style: italic;
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            font-size: 1.1rem;
            opacity: 0.6;
        }

        /* Protocol Warning */
        #protocolWarning {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(239, 68, 68, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            color: white;
            font-weight: 600;
        }

        #protocolWarning a {
            color: #fff;
            text-decoration: underline;
            margin-left: 10px;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div id="protocolWarning">
        ⚠️ Achtung: App wurde als Datei geöffnet. Die Funktionen gehen nur unter 
        <a href="http://127.0.0.1:5050">http://127.0.0.1:5050</a>
    </div>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="icon.png" width="30" height="30" style="border-radius: 6px; box-shadow: 0 0 10px rgba(26, 159, 255, 0.4);">
            Bibliothek
        </div>
        
        <div class="sidebar-section">
            <span id="gameCountText">MEINE SPIELE</span>
            <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
        
        <ul id="sidebarList" class="sidebar-list">
            <!-- Sidebar items -->
        </ul>
    </div>

    <div class="main-container">
        <div class="main-content">
            <div class="content-header">
                <h2>Meine Spiele</h2>
                <button class="add-app-btn" onclick="addApp()">+ Hinzufügen</button>
            </div>

            <div id="gameGrid" class="game-grid">
                <!-- Large grid items -->
                <div class="empty-state">Initialisiere Bibliothek...</div>
            </div>

            <h2>Zuletzt hinzugefügt</h2>
            <div id="recentsGrid" class="game-grid">
                <!-- Recent additions -->
            </div>
        </div>
    </div>

    <script>
        const sidebarList = document.getElementById('sidebarList');
        const gameGrid = document.getElementById('gameGrid');
        const recentsGrid = document.getElementById('recentsGrid');
        const gameCountText = document.getElementById('gameCountText');

        // Check for file protocol
        if (window.location.protocol === 'file:') {
            document.getElementById('protocolWarning').style.display = 'block';
        }

        async function loadApps() {
            try {
                const response = await fetch('/api/apps');
                const apps = await response.json();
                
                sidebarList.innerHTML = '';
                gameGrid.innerHTML = '';
                recentsGrid.innerHTML = '';
                
                gameCountText.innerText = `MEINE SPIELE ${apps.length > 0 ? '(' + apps.length + ')' : ''}`;

                if (apps.length === 0) {
                    gameGrid.innerHTML = '<div class="empty-state">Wähle ein Spiel per .exe aus, um deine Bibliothek zu starten.</div>';
                    return;
                }

                apps.forEach(async (app, index) => {
                    const iconUrl = `/api/icon?path=${encodeURIComponent(app.Path)}`;
                    
                    // Art laden
                    const artUrl = await getCachedArt(app.Name);

                    // Sidebar
                    const li = document.createElement('li');
                    li.className = 'sidebar-item';
                    li.onclick = () => launchApp(app.Path);
                    li.innerHTML = `
                        <img src="${iconUrl}" class="sidebar-icon" onerror="this.src='/api/icon?path=C:\\Windows\\System32\\shell32.dll'">
                        ${app.Name}
                    `;
                    sidebarList.appendChild(li);

                    // Card
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.onclick = () => launchApp(app.Path);
                    
                    card.innerHTML = `
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteApp('${app.Path}')">×</button>
                        <div class="game-image-container" id="art-${index}" style="background-image: url('${artUrl || ''}')">
                            <div class="game-image-overlay"></div>
                            ${!artUrl ? `<img src="${iconUrl}" class="game-icon-large" onerror="this.src='/api/icon?path=C:\\Windows\\System32\\shell32.dll'">` : ''}
                        </div>
                        <div class="game-card-overlay">
                            <span>${app.Name}</span>
                            ${index === apps.length - 1 ? '<span class="badge-new">NEW</span>' : ''}
                        </div>
                    `;
                    gameGrid.appendChild(card);
                    
                    // Add to recents
                    if (index >= apps.length - 3) {
                        const recentCard = card.cloneNode(true);
                        recentCard.onclick = () => launchApp(app.Path);
                        recentCard.querySelector('.delete-btn').onclick = (e) => {
                            e.stopPropagation();
                            deleteApp(app.Path);
                        };
                        recentsGrid.insertBefore(recentCard, recentsGrid.firstChild);
                    }
                });
            } catch (error) {
                console.error('Fehler:', error);
            }
        }

        async function addApp() {
            const response = await fetch('/api/add', { method: 'POST' });
            if (response.ok) loadApps();
        }

        async function getCachedArt(name) {
            const cacheKey = `art_${name}`;
            const cached = localStorage.getItem(cacheKey);
            if (cached) return cached;

            // Fetch from Steam via Backend Proxy
            try {
                const searchUrl = `https://store.steampowered.com/api/storesearch/?term=${encodeURIComponent(name)}&l=german&cc=DE`;
                const response = await fetch(`/api/proxy?url=${encodeURIComponent(searchUrl)}`);
                const data = await response.json();
                
                if (data && data.total > 0 && data.items[0]) {
                    const appId = data.items[0].id;
                    const artUrl = `https://cdn.akamai.steamstatic.com/steam/apps/${appId}/header.jpg`;
                    localStorage.setItem(cacheKey, artUrl);
                    return artUrl;
                }
            } catch (e) {
                console.warn("Art Fehler for " + name, e);
            }
            return null;
        }

        async function launchApp(path) {
            await fetch(`/api/launch?path=${encodeURIComponent(path)}`, { method: 'POST' });
        }

        async function deleteApp(path) {
            if (!confirm('Möchtest du dieses Spiel aus deiner Bibliothek entfernen?')) return;
            await fetch(`/api/apps?path=${encodeURIComponent(path)}`, { method: 'DELETE' });
            loadApps();
        }

        loadApps();
        setInterval(loadApps, 15000);
    </script>
</body>
</html>
