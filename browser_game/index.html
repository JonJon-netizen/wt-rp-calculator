<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Void | Celestial Arcade</title>
    <meta name="description" content="Ein minimalistisches Zen-Arcade-Erlebnis im neon-leuchtenden Kosmos.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="game-stats" class="stats hidden">
            <div class="stat-group left">
                <div class="stat-item highlight">
                    <span class="label">Leben</span>
                    <span id="lives-val" class="value">3</span>
                    <div class="life-progress-container">
                        <div id="life-progress-bar" class="life-progress-bar"></div>
                    </div>
                </div>
                <div id="ultimate-stat" class="stat-item">
                    <span class="label">Ultimate</span>
                    <span id="ultimate-val" class="value">0%</span>
                    <div class="ultimate-progress-container">
                        <div id="ultimate-progress-bar" class="ultimate-bar"></div>
                    </div>
                </div>
            </div>
            
            <div class="stat-group right">
                <div class="stat-item">
                    <span class="label">Punkte</span>
                    <span id="score-val" class="value">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Zeit</span>
                    <span id="timer-val" class="value">60</span>
                </div>
            </div>
        </div>

        <div id="ui-overlay" class="overlay">
            <!-- Start Screen -->
            <div id="start-screen" class="glass-card">
                <h1>Neon Void</h1>
                <p>Sammle <span class="lumos-text">Lumos</span>. <br> Meide die <span class="void-text">Leere</span>.</p>
                <div class="btn-group">
                    <button id="start-btn" class="primary-btn">Starten</button>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="glass-card hidden">
                <h2>Harmonie Beendet</h2>
                <div class="final-score">
                    <p>Ergebnis</p>
                    <span id="final-score-val">0</span>
                </div>
                <button id="restart-btn" class="primary-btn">Erneut Spielen</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
